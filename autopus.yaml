mode: full
project_name: autopus-adk
platforms:
  - claude-code
  - codex
  - gemini-cli
  - opencode
isolate_rules: true
language:
  comments: en
  commits: ko
  ai_responses: ko
architecture:
  auto_generate: true
  enforce: true
  layers: []
lore:
  enabled: true
  auto_inject: false
  required_trailers:
    - Constraint
  stale_threshold_days: 90
spec:
  id_format: SPEC-{DOMAIN}-{NUMBER}
  ears_types:
    - ubiquitous
    - event-driven
    - unwanted
    - optional
    - complex
  review_gate:
    enabled: true
    strategy: consensus
    providers: [claude, codex, gemini]
    judge: codex
    max_revisions: 2
    auto_collect_context: true
    context_max_lines: 500
methodology:
  mode: tdd
  enforce: true
  review_gate: true
router:
  strategy: balanced
  tiers:
    haiku: gemini
    opus: opus
    sonnet: codex
  categories:
    deep: opus
    git: haiku
    quick: haiku
    ultrabrain: opus
    visual: sonnet
    writing: sonnet
  intent_gate: true
hooks:
  pre_commit_arch: true
  pre_commit_lore: true
  react_ci_failure: true
  react_review: true
session:
  handoff_enabled: true
  continue_file: .auto-continue.md
  max_context_tokens: 2000
orchestra:
  enabled: true
  default_strategy: consensus
  timeout_seconds: 120
  judge: codex
  providers:
    claude:
      binary: claude
      args: [-p, "", --output-format, json, --dangerously-skip-permissions]
      pane_args: [--print, --model, opus, --effort, high, --dangerously-skip-permissions]
      prompt_via_args: true
      subprocess:
        schema_flag: --json-schema
        output_format: json
    codex:
      binary: codex
      args: [exec, --full-auto, -m, gpt-4o, --output-last-message, "-", ""]
      pane_args: [-m, gpt-4o]
      prompt_via_args: true
      subprocess:
        schema_flag: --output-schema
        output_format: json
    gemini:
      binary: gemini
      args: [-m, gemini-1.5-pro, --output-format, json, -p, ""]
      pane_args: [-m, gemini-1.5-pro]
      prompt_via_args: true
      subprocess:
        output_format: json
  commands:
    brainstorm:
      strategy: consensus
      providers: [claude, codex, gemini]
    plan:
      strategy: consensus
      providers: [claude, codex, gemini]
    review:
      strategy: consensus
      providers: [claude, codex, gemini]
    secure:
      strategy: consensus
      providers: [claude, codex, gemini]
quality:
  default: ultra
  presets:
    balanced:
      description: 설계는 Claude(Opus), 구현은 Codex(Sonnet), 리뷰는 Gemini(Haiku).
      agents:
        architect: opus
        debugger: sonnet
        devops: sonnet
        executor: sonnet
        explorer: sonnet
        planner: opus
        reviewer: haiku
        security-auditor: opus
        spec-writer: opus
        tester: sonnet
        validator: sonnet
    ultra:
      description: 모든 에이전트를 고성능 모델 티어로 실행.
      agents:
        architect: opus
        debugger: opus
        devops: opus
        executor: opus
        explorer: opus
        planner: opus
        reviewer: sonnet
        security-auditor: opus
        spec-writer: opus
        tester: opus
        validator: opus

