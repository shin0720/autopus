mode: full
project_name: autopus-adk
platforms:
    - claude-code
    - codex
    - gemini-cli
    - opencode
isolate_rules: true
language:
    comments: en
    commits: ko
    ai_responses: ko
architecture:
    auto_generate: true
    enforce: true
    layers: []
lore:
    enabled: true
    auto_inject: false
    required_trailers:
        - Constraint
    stale_threshold_days: 90
spec:
    id_format: SPEC-{DOMAIN}-{NUMBER}
    ears_types:
        - ubiquitous
        - event-driven
        - unwanted
        - optional
        - complex
    review_gate:
        enabled: true
        strategy: debate
        providers: [claude, gemini]
        judge: claude
        max_revisions: 2
        auto_collect_context: true
        context_max_lines: 500
        # verdict_threshold: 0.67       # supermajority fraction (default 0.67)
        # pass_criteria: ""              # override verdict decision rules (empty = default)
        # doc_context_max_lines: 200     # max lines of plan/research/acceptance.md to inject (default 200)
methodology:
    mode: tdd
    enforce: true
    review_gate: true
router:
    strategy: balanced
    tiers:
        economy: claude-sonnet-4-6
        premium: claude-opus-4-7
        standard: claude-sonnet-4-6
    categories:
        deep: premium
        git: economy
        quick: economy
        ultrabrain: premium
        visual: standard
        writing: standard
    intent_gate: true
hooks:
    pre_commit_arch: true
    pre_commit_lore: true
    react_ci_failure: true
    react_review: true
session:
    handoff_enabled: true
    continue_file: .auto-continue.md
    max_context_tokens: 2000
orchestra:
    enabled: true
    default_strategy: consensus
    timeout_seconds: 240
    judge: claude
    providers:
        claude:
            binary: claude
            args: [--print, --model, opus, --effort, max]
        codex:
            binary: codex
            args: [exec, --sandbox, workspace-write, -m, gpt-5.5, -c, 'model_reasoning_effort="xhigh"']
            pane_args: [-m, gpt-5.5, -c, 'model_reasoning_effort="xhigh"']
            interactive_input: sendkeys
        gemini:
            binary: gemini
            args: [-m, gemini-3.1-pro-preview]
            pane_args: [-m, gemini-3.1-pro-preview]
            prompt_via_args: true
    commands:
        brainstorm:
            strategy: debate
            providers: [claude, codex, gemini]
        plan:
            strategy: consensus
            providers: [claude, codex, gemini]
        review:
            strategy: debate
            providers: [claude, codex, gemini]
        secure:
            strategy: consensus
            providers: [claude, codex, gemini]
quality:
    default: ultra
    presets:
        balanced:
            description: 핵심 분석은 Opus, 기본 작업은 Sonnet. Haiku 미사용.
            agents:
                architect: opus
                debugger: sonnet
                devops: sonnet
                executor: sonnet
                explorer: sonnet
                planner: opus
                reviewer: sonnet
                security-auditor: opus
                spec-writer: opus
                tester: sonnet
                validator: sonnet
        ultra:
            description: 모든 에이전트를 Opus로 실행. 최고 품질.
            agents:
                architect: opus
                debugger: opus
                devops: opus
                executor: opus
                explorer: opus
                planner: opus
                reviewer: opus
                security-auditor: opus
                spec-writer: opus
                tester: opus
                validator: opus
