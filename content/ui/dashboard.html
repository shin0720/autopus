<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Autopus Virtual Studio (v3.2 Approval Mode)</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-bg: #161b22;
            --border-color: #30363d;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #d29922;
            --accent-red: #f85149;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
        }
        body { background: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar-left { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 50; }
        .main-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        .sidebar-right { width: 450px; background: var(--sidebar-bg); border-left: 1px solid var(--border-color); padding: 20px; display: none; flex-direction: column; z-index: 50; }
        
        .top-bar { height: 55px; background: var(--sidebar-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .provider-status { display: flex; gap: 15px; }
        .status-item { display: flex; align-items: center; gap: 6px; font-size: 11px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #484f58; }
        .dot.online { background: var(--accent-green); box-shadow: 0 0 5px var(--accent-green); }

        .file-list { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; }
        .file-item { padding: 6px 8px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .file-item:hover { background: #1f242c; }

        .canvas { flex: 1; position: relative; background-image: radial-gradient(#30363d 1px, transparent 1px); background-size: 40px 40px; }
        .lane-container { display: flex; width: 100%; height: 100%; position: absolute; pointer-events: none; }
        .lane { flex: 1; border-right: 1px dashed #30363d; display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
        .lane-title { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 20px; }

        .node { background: #21262d; border: 1px solid var(--border-color); border-radius: 8px; width: 170px; padding: 12px; margin-bottom: 15px; pointer-events: auto; cursor: pointer; transition: 0.2s; }
        .node:hover { border-color: var(--accent-blue); transform: translateY(-2px); }
        .node.active { border-color: var(--accent-orange); animation: pulse 1.5s infinite; }
        .node.completed { border-color: var(--accent-green); border-width: 2px; }
        
        .overlay-panel { position: absolute; top: 20px; left: 20px; right: 20px; bottom: 20px; background: #0d1117; border: 1px solid var(--border-color); border-radius: 12px; z-index: 100; display: none; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .panel-header { padding: 10px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; background: #161b22; border-radius: 12px 12px 0 0; }
        .panel-body { flex: 1; padding: 25px; overflow: auto; white-space: pre-wrap; font-size: 14px; line-height: 1.6; color: #d1d5db; }
        .panel-footer { padding: 15px; border-top: 1px solid var(--border-color); display: flex; justify-content: center; gap: 15px; background: #161b22; border-radius: 0 0 12px 12px; }

        textarea { flex: 1; width: 100%; background: #010409; border: 1px solid var(--border-color); border-radius: 8px; color: white; padding: 20px; margin: 15px 0; resize: none; font-size: 15px; line-height: 1.6; box-sizing: border-box; }
        .btn-run { background: var(--accent-blue); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-approve { background: var(--accent-green); }
        .btn-reject { background: var(--accent-red); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="sidebar-left">
        <div style="padding:15px; border-bottom:1px solid var(--border-color); font-weight:bold; display:flex; justify-content:space-between;">
            📁 탐색기 <span id="sel-count" style="color:var(--accent-blue); font-size:10px;">0</span>
        </div>
        <div class="file-list" id="file-list"></div>
    </div>

    <div class="main-area">
        <div class="top-bar">
            <div>
                <div style="font-weight:900; color:var(--accent-blue)">🐙 AUTOPUS STUDIO v3.2</div>
                <div id="save-path" style="font-size:9px; color:var(--text-dim)">저장: .autopus/workflows/state.json</div>
            </div>
            <div class="provider-status">
                <div class="status-item" onclick="openKeyModal('claude')"><div id="dot-claude" class="dot"></div> Claude</div>
                <div class="status-item" onclick="openKeyModal('gemini')"><div id="dot-gemini" class="dot"></div> Gemini</div>
                <div class="status-item"><div id="dot-codex" class="dot online"></div> Codex</div>
                <button class="btn-run" style="padding:4px 10px; font-size:10px; background:var(--sidebar-bg); border:1px solid var(--border-color)" onclick="saveCurrentState()">💾 저장</button>
            </div>
            <div id="proj-name" style="font-size:12px; color:var(--accent-green)">로딩 중...</div>
        </div>
        
        <div class="canvas">
            <div class="lane-container">
                <div class="lane" id="lane-plan"><div class="lane-title">기획 & 설계</div></div>
                <div class="lane" id="lane-dev"><div class="lane-title">개발 & 구현</div></div>
                <div class="lane" id="lane-qa"><div class="lane-title">검증 & QA</div></div>
                <div class="lane" id="lane-ops"><div class="lane-title">리뷰 & 배포</div></div>
            </div>
            <!-- Approval Panel -->
            <div class="overlay-panel" id="overlay-panel">
                <div class="panel-header">
                    <span id="panel-title" style="font-weight:bold; color:var(--accent-blue)">AI 결과 검토</span>
                    <button class="btn-run" style="padding:4px 12px; background:transparent; border:1px solid var(--border-color)" onclick="closePanel()">닫기</button>
                </div>
                <div class="panel-body" id="panel-content"></div>
                <div class="panel-footer" id="approval-footer" style="display:none;">
                    <button class="btn-run btn-reject" onclick="handleReject()">❌ 반려 (재지시)</button>
                    <button class="btn-run btn-approve" onclick="handleApprove()">✅ 승인 (다음 단계 진행)</button>
                </div>
            </div>
        </div>
        <div id="terminal" style="height:150px; background:#010409; border-top:1px solid #30363d; padding:15px; overflow-y:auto; font-family:monospace; font-size:12px;"></div>
    </div>

    <div class="sidebar-right" id="sidebar-right">
        <h3 id="drawer-title" style="color:var(--accent-blue); margin:0;">업무 할당</h3>
        <p id="drawer-desc" style="font-size:11px; color:var(--text-dim); margin:5px 0 20px 0;"></p>
        <button class="btn-run" style="background:var(--accent-orange); width:100%; margin-bottom:10px;" id="workflow-btn" onclick="startChainedWorkflow()">⛓️ 연쇄 협업 시작</button>
        <textarea id="prompt-input" placeholder="상세 지시사항을 입력하세요..."></textarea>
        <button class="btn-run" style="width:100%;" onclick="assignTask()">단일 실행</button>
        <button class="btn-run" style="background:transparent; color:var(--text-dim); width:100%; margin-top:10px;" onclick="closeDrawer()">취소</button>
    </div>

    <script>
        let selectedAgent = null; let selectedFiles = new Set(); let appState = { nodes: {}, logs: [] };
        let workflowQueue = []; // 연쇄 작업을 위한 큐

        const agents = [
            { id: "planner", name: "Planner", role: "기획자", dept: "plan", desc: "분석 및 태스크 분해" },
            { id: "spec", name: "Spec Writer", role: "명세 작성자", dept: "plan", desc: "SPEC.md 작성" },
            { id: "arch", name: "Architect", role: "아키텍트", dept: "plan", desc: "구조 설계" },
            { id: "expl", name: "Explorer", role: "탐험가", dept: "plan", desc: "코드 분석" },
            { id: "exec", name: "Executor", role: "실행자", dept: "dev", desc: "코드 구현" },
            { id: "deep", name: "Deep Worker", role: "심층 작업자", dept: "dev", desc: "장기 태스크" },
            { id: "dbug", name: "Debugger", role: "해결사", dept: "dev", desc: "버그 수정" },
            { id: "anno", name: "Annotator", role: "태그 관리자", dept: "dev", desc: "@AX 주석 관리" },
            { id: "test", name: "Tester", role: "테스터", dept: "qa", desc: "테스트 작성" },
            { id: "val", name: "Validator", role: "검증자", dept: "qa", desc: "품질 검증" },
            { id: "fend", name: "Frontend Spec", role: "UI 전문가", dept: "qa", desc: "E2E 테스트" },
            { id: "uxv", name: "UX Validator", role: "UX 검증자", dept: "qa", desc: "비주얼 회귀" },
            { id: "perf", name: "Perf Engineer", role: "성능 전문가", dept: "qa", desc: "성능 분석" },
            { id: "rev", name: "Reviewer", role: "리뷰어", dept: "ops", desc: "코드 리뷰" },
            { id: "sec", name: "Security Audit", role: "보안 감사", dept: "ops", desc: "보안 점검" },
            { id: "devops", name: "DevOps", role: "운영자", dept: "ops", desc: "배포 자동화" }
        ];

        function getIcon(f) {
            const ext = f.split('.').pop().toLowerCase();
            const dict = { py:'🐍', go:'🐹', md:'📝', json:'📦', yaml:'⚙️', sh:'🐚' };
            return dict[ext] || '📄';
        }

        async function loadFiles() {
            const res = await fetch('/api/files/list');
            const files = await res.json();
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            files.forEach(f => {
                const item = document.createElement('div');
                item.className = 'file-item';
                const cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'file-checkbox';
                cb.onchange = () => { if(cb.checked) selectedFiles.add(f); else selectedFiles.delete(f); document.getElementById('sel-count').innerText = selectedFiles.size; };
                const span = document.createElement('span'); span.innerHTML = getIcon(f) + ' ' + f;
                span.onclick = async () => { const r = await fetch('/api/files/read?path=' + encodeURIComponent(f)); showPanel(f, await r.text(), false); };
                item.appendChild(cb); item.appendChild(span);
                list.appendChild(item);
            });
        }

        function showPanel(t, c, isApproval) {
            document.getElementById('panel-title').innerText = t;
            document.getElementById('panel-content').innerText = c;
            document.getElementById('overlay-panel').style.display = 'flex';
            document.getElementById('approval-footer').style.display = isApproval ? 'flex' : 'none';
        }
        function closePanel() { document.getElementById('overlay-panel').style.display = 'none'; }

        async function startChainedWorkflow() {
            const prompt = document.getElementById('prompt-input').value; if(!prompt) return;
            workflowQueue = [selectedAgent.id]; // 시작 에이전트 큐에 삽입
            addLog("System", "⛓️ 승인 모드 워크플로우를 시작합니다.");
            runNextInQueue(prompt);
        }

        async function runNextInQueue(inputPrompt) {
            if(workflowQueue.length === 0) return;
            const currentId = workflowQueue.shift();
            const agent = agents.find(a => a.id === currentId);
            closeDrawer();
            
            document.getElementById('node-' + currentId).classList.add('active');
            addLog(agent.name, "분석 중...");

            const res = await fetch('/api/workflow/run', {
                method: 'POST', body: JSON.stringify({ agentId: currentId, prompt: inputPrompt, context: Array.from(selectedFiles) })
            });
            const data = await res.json();
            
            document.getElementById('node-' + currentId).classList.remove('active');
            if(data.status === 'success') {
                document.getElementById('node-' + currentId).classList.add('completed');
                appState.lastOutput = data.output;
                appState.nextAgentId = data.nextAgent;
                showPanel(agent.name + "의 결과 검토 (승인 필요)", data.output, true);
            }
        }

        function handleApprove() {
            closePanel();
            addLog("System", "✅ 사용자가 결과를 승인했습니다. 다음 단계로 진행합니다.");
            if(appState.nextAgentId) {
                workflowQueue.push(appState.nextAgentId);
                runNextInQueue(appState.lastOutput);
            } else {
                addLog("System", "🏁 모든 과정이 완료되었습니다.");
            }
        }

        function handleReject() {
            closePanel();
            addLog("System", "❌ 결과가 반려되었습니다. 재지시가 필요합니다.");
            document.getElementById('sidebar-right').style.display = 'flex';
        }

        function addLog(agent, msg) {
            const div = document.createElement('div');
            div.innerHTML = '<span style="color:var(--accent-orange)">[' + agent + ']</span> ' + msg;
            document.getElementById('terminal').appendChild(div);
            document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
        }

        function openKeyModal(p) { targetProvider = p; document.getElementById('key-modal').style.display = 'flex'; }
        async function saveApiKey() {
            const key = document.getElementById('api-key-input').value;
            await fetch('/api/providers/keys', { method: 'POST', body: JSON.stringify({ provider: targetProvider, key }) });
            document.getElementById('key-modal').style.display = 'none'; updateHealth();
        }
        async function updateHealth() {
            const res = await fetch('/api/providers/health');
            const data = await res.json();
            Object.keys(data).forEach(id => { const d = document.getElementById('dot-' + id); if(d) d.className = 'dot ' + (data[id] ? 'online' : 'offline'); });
        }
        function openDrawer(a) { selectedAgent = a; document.getElementById('drawer-title').innerText = a.name; document.getElementById('drawer-desc').innerText = a.desc; document.getElementById('sidebar-right').style.display = 'flex'; }
        function closeDrawer() { document.getElementById('sidebar-right').style.display = 'none'; }

        async function assignTask() {
            const prompt = document.getElementById('prompt-input').value;
            const agent = selectedAgent; closeDrawer();
            document.getElementById('node-' + agent.id).classList.add('active');
            const res = await fetch('/api/workflow/run', {
                method: 'POST', body: JSON.stringify({ agentId: agent.id, prompt, context: Array.from(selectedFiles) })
            });
            const data = await res.json();
            document.getElementById('node-' + agent.id).classList.remove('active');
            showPanel(agent.name + "의 분석 결과", data.output, false);
        }

        function init() {
            agents.forEach(a => {
                const lane = document.getElementById('lane-' + a.dept);
                const node = document.createElement('div');
                node.className = 'node'; node.id = 'node-' + a.id;
                node.onclick = () => openDrawer(a);
                node.innerHTML = '<div class="node-name">' + a.name + '</div><div class="node-role">' + a.role + '</div>';
                lane.appendChild(node);
            });
            loadFiles(); updateHealth(); setInterval(updateHealth, 5000);
            fetch('/api/status').then(r => r.json()).then(d => document.getElementById('proj-name').innerText = "PROJECT: " + d.project.toUpperCase());
        }
        init();
    </script>
</body>
</html>
`
