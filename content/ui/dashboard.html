<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Autopus Studio (v3.9 Structured Data)</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-bg: #161b22;
            --border-color: #30363d;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #d29922;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
        }
        body { background: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar-left { width: 260px; min-width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; z-index: 100; }
        .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .sidebar-right { width: 420px; min-width: 420px; background: var(--sidebar-bg); border-left: 1px solid var(--border-color); padding: 20px; display: none; flex-direction: column; overflow-y: auto; z-index: 100; }
        
        .drive-selector { padding: 10px; display: flex; gap: 5px; border-bottom: 1px solid var(--border-color); }
        .btn-sm { flex: 1; padding: 4px; font-size: 10px; background: #21262d; border: 1px solid var(--border-color); color: white; border-radius: 4px; cursor: pointer; }
        
        .folder-list { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; }
        .folder-item { padding: 6px 8px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .folder-item:hover { background: #1f242c; color: var(--accent-blue); }

        /* Top Bar */
        .top-bar { height: 50px; background: var(--sidebar-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .logo { font-weight: 900; color: var(--accent-blue); font-size: 16px; }

        /* Canvas & Nodes */
        .canvas-area { flex: 1; position: relative; background-image: radial-gradient(#30363d 1px, transparent 1px); background-size: 40px 40px; overflow: auto; }
        #flow-svg { position: absolute; top: 0; left: 0; min-width: 2000px; min-height: 2000px; pointer-events: none; }
        
        .node { position: absolute; background: #21262d; border: 1px solid var(--border-color); border-radius: 8px; width: 150px; padding: 10px; cursor: move; z-index: 20; }
        .node:hover { border-color: var(--accent-blue); }
        .node.active { border-color: var(--accent-orange); animation: pulse 1.5s infinite; }
        .node.completed { border-color: var(--accent-green); border-width: 2px; }
        .node-name { font-size: 12px; font-weight: bold; margin-bottom: 2px; }
        .node-role { font-size: 9px; color: var(--text-dim); text-transform: uppercase; }

        .terminal { height: 150px; background: #010409; border-top: 1px solid var(--border-color); padding: 10px; overflow-y: auto; font-family: monospace; font-size: 11px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="sidebar-left">
        <div class="drive-selector">
            <button class="btn-sm" onclick="changeWorkspace('/mnt/c')">C:</button>
            <button class="btn-sm" onclick="changeWorkspace('/mnt/e')">E:</button>
            <button class="btn-sm" onclick="changeWorkspace('/mnt/c/Users/SAMSUNG/Desktop')">Desktop</button>
        </div>
        <div style="padding:10px; font-size:11px; font-weight:bold; color:var(--text-dim)">FOLDER EXPLORER</div>
        <div class="folder-list" id="folder-list"></div>
        <div style="padding:10px; font-size:11px; font-weight:bold; color:var(--text-dim); border-top: 1px solid var(--border-color)">PROJECT FILES</div>
        <div class="folder-list" id="file-list"></div>
    </div>

    <div class="main-container">
        <div class="top-bar">
            <div class="logo">🐙 AUTOPUS STUDIO v3.9</div>
            <div id="current-path" style="font-size:11px; color:var(--accent-green)">-</div>
            <button class="btn-sm" style="flex:none; padding:5px 15px;" onclick="saveCurrentState()">💾 WORKFLOW SAVE</button>
        </div>

        <div class="canvas-area" id="canvas-area">
            <svg id="flow-svg"></svg>
            <div id="nodes-container"></div>
        </div>

        <div class="terminal" id="terminal"><div>[System] 16인 가상 스튜디오 에디터 가동 중...</div></div>
    </div>

    <script>
        let currentDir = "";
        const agents = [
            { id: "planner", name: "Planner", role: "기획자", dept: "plan", x: 50, y: 50 },
            { id: "spec", name: "Spec Writer", role: "명세서", dept: "plan", x: 250, y: 50 },
            { id: "arch", name: "Architect", role: "설계자", dept: "plan", x: 450, y: 50 },
            { id: "expl", name: "Explorer", role: "탐험가", dept: "plan", x: 650, y: 50 },
            
            { id: "exec", name: "Executor", role: "개발자", dept: "dev", x: 50, y: 200 },
            { id: "deep", name: "Deep Worker", role: "심층작업", dept: "dev", x: 250, y: 200 },
            { id: "dbug", name: "Debugger", role: "해결사", dept: "dev", x: 450, y: 200 },
            { id: "anno", name: "Annotator", role: "태그관리", dept: "dev", x: 650, y: 200 },
            
            { id: "test", name: "Tester", role: "테스터", dept: "qa", x: 50, y: 350 },
            { id: "val", name: "Validator", role: "품질검증", dept: "qa", x: 250, y: 350 },
            { id: "fend", name: "Frontend", role: "UI전문가", dept: "qa", x: 450, y: 350 },
            { id: "uxv", name: "UX Validator", role: "시각검증", dept: "qa", x: 650, y: 350 },
            
            { id: "perf", name: "Perf Eng", role: "성능분석", dept: "ops", x: 50, y: 500 },
            { id: "rev", name: "Reviewer", role: "리뷰어", dept: "ops", x: 250, y: 500 },
            { id: "sec", name: "Security", role: "보안감사", dept: "ops", x: 450, y: 500 },
            { id: "devops", name: "DevOps", role: "배포자", dept: "ops", x: 650, y: 500 }
        ];

        async function changeWorkspace(path) {
            const res = await fetch('/api/workspace/change', { method: 'POST', body: JSON.stringify({ path }) });
            const data = await res.json();
            currentDir = data.currentDir;
            document.getElementById('current-path').innerText = currentDir;
            loadWorkspaceList();
            loadFileList();
        }

        async function loadWorkspaceList() {
            const res = await fetch('/api/workspace/list');
            const data = await res.json();
            const list = document.getElementById('folder-list');
            list.innerHTML = '<div class="folder-item" onclick="changeWorkspace(\''+data.parent+'\')">⬆️ UP..</div>';
            data.folders.forEach(f => {
                const item = document.createElement('div');
                item.className = 'folder-item';
                item.innerHTML = '📁 ' + f;
                item.onclick = () => changeWorkspace(currentDir + '/' + f);
                list.appendChild(item);
            });
        }

        async function loadFileList() {
            const res = await fetch('/api/files/list');
            const files = await res.json();
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            files.forEach(f => {
                const item = document.createElement('div');
                item.className = 'folder-item';
                item.innerHTML = '📄 ' + f;
                list.appendChild(item);
            });
        }

        function initEditor() {
            const container = document.getElementById('nodes-container');
            agents.forEach(a => {
                const node = document.createElement('div');
                node.className = 'node'; node.id = 'node-' + a.id;
                node.style.left = a.x + 'px'; node.style.top = a.y + 'px';
                node.innerHTML = '<div class="node-name">' + a.name + '</div><div class="node-role">' + a.role + '</div>';
                node.onmousedown = startDrag;
                container.appendChild(node);
            });
            changeWorkspace('.');
        }

        function startDrag(e) {
            const node = e.currentTarget;
            let offsetBox = document.getElementById('canvas-area').getBoundingClientRect();
            let shiftX = e.clientX - node.getBoundingClientRect().left;
            let shiftY = e.clientY - node.getBoundingClientRect().top;
            function moveAt(pageX, pageY) {
                node.style.left = (pageX - offsetBox.left - shiftX + document.getElementById('canvas-area').scrollLeft) + 'px';
                node.style.top = (pageY - offsetBox.top - shiftY + document.getElementById('canvas-area').scrollTop) + 'px';
            }
            function onMouseMove(e) { moveAt(e.pageX, e.pageY); }
            document.addEventListener('mousemove', onMouseMove);
            document.onmouseup = () => { document.removeEventListener('mousemove', onMouseMove); document.onmouseup = null; };
        }

        initEditor();
    </script>
</body>
</html>
`
