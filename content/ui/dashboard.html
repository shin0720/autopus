<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Autopus Studio (v4.9 Full Squad)</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-bg: #161b22;
            --border-color: #30363d;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #d29922;
            --accent-red: #f85149;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
        }
        body { background: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar-left { width: 280px; min-width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; z-index: 100; }
        .main-container { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .sidebar-right { width: 420px; min-width: 420px; background: var(--sidebar-bg); border-left: 1px solid var(--border-color); padding: 20px; display: none; flex-direction: column; overflow-y: auto; z-index: 100; }
        
        .drive-bar { padding: 10px; display: flex; gap: 5px; border-bottom: 1px solid var(--border-color); background: #21262d; }
        .btn-drive { flex: 1; padding: 6px; font-size: 11px; background: #30363d; border: 1px solid var(--border-color); color: white; border-radius: 4px; cursor: pointer; }

        .list-container { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; }
        .item { padding: 6px 8px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item:hover { background: #1f242c; color: var(--accent-blue); }

        .top-bar { height: 55px; background: var(--sidebar-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .logo { font-weight: 900; color: var(--accent-blue); font-size: 18px; }
        .provider-status { display: flex; gap: 15px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #484f58; transition: background 0.3s; }
        .dot.online { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
        .dot.offline { background: var(--accent-red); box-shadow: 0 0 6px var(--accent-red); }

        .canvas-area { flex: 1; position: relative; background-image: radial-gradient(#30363d 1px, transparent 1px); background-size: 40px 40px; overflow: hidden; }
        #flow-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .node { position: absolute; background: #21262d; border: 1px solid var(--border-color); border-radius: 8px; width: 155px; padding: 12px; cursor: move; z-index: 20; }
        .node:hover { border-color: var(--accent-blue); }
        .node.active { border-color: var(--accent-orange); animation: pulse 1.5s infinite; }
        .node.completed { border-color: var(--accent-green); border-width: 2px; }
        
        .port { width: 12px; height: 12px; background: var(--accent-blue); border: 2px solid var(--sidebar-bg); border-radius: 50%; position: absolute; top: 50%; transform: translateY(-50%); cursor: crosshair; }
        .port-in { left: -7px; }
        .port-out { right: -7px; }

        .flow-line { fill: none; stroke: var(--accent-blue); stroke-width: 2.5; stroke-dasharray: 6; stroke-linecap: round; cursor: pointer; pointer-events: auto; }
        .flow-line:hover { stroke: var(--accent-red); stroke-width: 4; }

        .terminal { height: 150px; background: #010409; border-top: 1px solid var(--border-color); padding: 15px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .overlay-panel { position: absolute; top: 20px; left: 20px; right: 20px; bottom: 20px; background: #0d1117; border: 1px solid var(--border-color); border-radius: 12px; z-index: 200; display: none; flex-direction: column; }
        .panel-body { flex: 1; padding: 25px; overflow: auto; white-space: pre-wrap; font-size: 14px; line-height: 1.6; color: #d1d5db; }

        textarea { flex: 1; width: 100%; background: #010409; border: 1px solid var(--border-color); border-radius: 8px; color: white; padding: 20px; margin: 15px 0; resize: none; font-size: 15px; box-sizing: border-box; }
        .btn-run { background: var(--accent-blue); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="sidebar-left">
        <div class="drive-bar">
            <button class="btn-drive" onclick="changeWorkspace('/mnt/c')">C:</button>
            <button class="btn-drive" onclick="changeWorkspace('/mnt/e')">E:</button>
            <button class="btn-drive" onclick="changeWorkspace('/mnt/c/Users/SAMSUNG/Desktop')">Desktop</button>
        </div>
        <div id="dir-name" style="padding:10px; font-size:11px; font-weight:bold; color:var(--accent-green); background:#0d1117;">PROJECT ROOT</div>
        <div class="list-container" id="folder-list"></div>
        <div style="padding:10px; font-size:11px; font-weight:bold; color:var(--text-dim); border-top:1px solid var(--border-color)">PROJECT FILES</div>
        <div class="list-container" id="file-list"></div>
    </div>

    <div class="main-container">
        <div class="top-bar">
            <div class="logo">🐙 STUDIO v4.9 FINAL</div>
            <span style="font-size:10px; color:var(--text-dim)">💾 .autopus/workflows/state.json</span>
            <div class="provider-status">
                <div class="status-item" onclick="openKeyModal('claude')"><div id="dot-claude" class="dot"></div> Claude</div>
                <div class="status-item" onclick="openKeyModal('gemini')"><div id="dot-gemini" class="dot"></div> Gemini</div>
                <div class="status-item"><div id="dot-codex" class="dot online"></div> Codex</div>
                <button onclick="saveState()" style="background:#238636; color:white; border:none; padding:4px 12px; border-radius:4px; font-size:11px; cursor:pointer;">💾 저장</button>
                <button onclick="clearConnections()" style="background:var(--accent-red); color:white; border:none; padding:4px 12px; border-radius:4px; font-size:11px; cursor:pointer;">🧹 선 전체삭제</button>
            </div>
        </div>
        <div class="canvas-area" id="canvas-area">
            <svg id="flow-svg"><defs><marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-blue)" /></marker></defs></svg>
            <div id="nodes-container"></div>
            <div id="overlay-panel" class="overlay-panel">
                <div style="padding:10px 20px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between; background:#161b22; border-radius:12px 12px 0 0;">
                    <span id="panel-title">분석 결과</span>
                    <button onclick="closePanel()" style="background:transparent; border:1px solid var(--border-color); color:white; padding:4px 10px; cursor:pointer;">닫기</button>
                </div>
                <div id="panel-content" class="panel-body"></div>
                <div id="approval-footer" style="padding:15px; background:#161b22; display:flex; justify-content:center; gap:15px; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;">
                    <button class="btn-run" style="background:var(--accent-green)" onclick="handleApprove()">✅ 승인 및 다음진행</button>
                    <button class="btn-run" style="background:var(--accent-red)" onclick="handleReject()">❌ 반려 및 재지시</button>
                </div>
            </div>
        </div>
        <div id="terminal" class="terminal"><div>[System] 16인 완전체 팀 소환 완료. 정식판 v4.9 가동.</div></div>
    </div>

    <div class="sidebar-right" id="sidebar-right">
        <h3 id="drawer-title" style="color:var(--accent-blue); margin:0;">에이전트 업무</h3>
        <p id="drawer-desc" style="font-size:11px; color:var(--text-dim); margin-top:5px;"></p>
        <textarea id="prompt-input" placeholder="지시사항을 상세히 입력하세요..."></textarea>
        <button class="btn-run" style="width:100%;" onclick="assignTask()">실전 분석 시작</button>
        <button class="btn-run" style="background:transparent; color:var(--text-dim); width:100%; margin-top:10px;" onclick="closeDrawer()">취소</button>
    </div>

    <div id="key-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:3000; justify-content:center; align-items:center;">
        <div style="background:var(--sidebar-bg); padding:25px; border-radius:12px; width:400px; border:1px solid var(--border-color)">
            <h3 id="key-title">API 키 등록</h3>
            <input type="password" id="api-key-input" style="width:100%; padding:10px; background:#010409; border:1px solid var(--border-color); color:white; margin:15px 0;">
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <button onclick="document.getElementById('key-modal').style.display='none'" style="background:transparent; border:none; color:var(--text-dim); cursor:pointer;">취소</button>
                <button onclick="saveApiKey()" style="background:var(--accent-blue); color:white; border:none; padding:8px 20px; border-radius:4px; cursor:pointer;">적용</button>
            </div>
        </div>
    </div>

    <script>
        let connections = []; let selectedFiles = new Set(); let isConnecting = false; let tempLineFrom = null;
        let lastOutput = ""; let nextId = "";
        let nodeOutputs = {};

        const agents = [
            { id: "planner", name: "Planner", role: "기획자", x: 40, y: 30 },
            { id: "spec", name: "Spec Writer", role: "명세서", x: 210, y: 30 },
            { id: "arch", name: "Architect", role: "설계자", x: 380, y: 30 },
            { id: "expl", name: "Explorer", role: "탐험가", x: 550, y: 30 },
            { id: "exec", name: "Executor", role: "개발자", x: 40, y: 170 },
            { id: "deep", name: "Deep Worker", role: "심층작업", x: 210, y: 170 },
            { id: "dbug", name: "Debugger", role: "해결사", x: 380, y: 170 },
            { id: "anno", name: "Annotator", role: "태그관리", x: 550, y: 170 },
            { id: "test", name: "Tester", role: "테스터", x: 40, y: 310 },
            { id: "val", name: "Validator", role: "품질검증", x: 210, y: 310 },
            { id: "fend", name: "Frontend", role: "UI전문가", x: 380, y: 310 },
            { id: "uxv", name: "UX Validator", role: "시각검증", x: 550, y: 310 },
            { id: "perf", name: "Perf Eng", role: "성능분석", x: 40, y: 450 },
            { id: "rev", name: "Reviewer", role: "리뷰어", x: 210, y: 450 },
            { id: "sec", name: "Security", role: "보안감사", x: 380, y: 450 },
            { id: "devops", name: "DevOps", role: "배포자", x: 550, y: 450 }
        ];

        async function changeWorkspace(path) {
            const res = await fetch('/api/workspace/change', { method: 'POST', body: JSON.stringify({ path }) });
            const data = await res.json();
            document.getElementById('dir-name').innerText = data.currentDir;
            loadWorkspaceList(); loadFiles();
        }

        async function loadWorkspaceList() {
            const res = await fetch('/api/workspace/list'); const data = await res.json();
            const list = document.getElementById('folder-list'); list.innerHTML = '<div class="item" onclick="changeWorkspace(\'..\')">⬆️ 상위 폴더로</div>';
            data.folders.forEach(f => {
                const d = document.createElement('div'); d.className = 'item'; d.innerHTML = '📁 ' + f;
                d.onclick = () => changeWorkspace(f); list.appendChild(d);
            });
        }

        async function loadFiles() {
            const res = await fetch('/api/files/list'); const data = await res.json();
            const list = document.getElementById('file-list'); list.innerHTML = '';
            data.forEach(f => {
                const d = document.createElement('div'); d.className = 'item';
                d.innerHTML = '<input type="checkbox" class="file-checkbox"> 📄 ' + f;
                d.querySelector('input').onchange = (e) => { if(e.target.checked) selectedFiles.add(f); else selectedFiles.delete(f); };
                list.appendChild(d);
            });
        }

        function addLog(agent, msg) {
            const div = document.createElement('div');
            div.innerHTML = '<strong>['+agent+']</strong> ' + msg;
            document.getElementById('terminal').appendChild(div);
            document.getElementById('terminal').scrollTop = 9999;
        }

        async function assignTask() {
            const prompt = document.getElementById('prompt-input').value; if(!prompt) return;
            const agent = selectedAgent; closeDrawer();
            const node = document.getElementById('node-' + agent.id);
            node.classList.add('active');
            addLog(agent.name, "분석 엔진을 가동합니다. 잠시만 기다려주세요...");
            
            const res = await fetch('/api/workflow/run', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ agentId: agent.id, prompt, context: Array.from(selectedFiles) })
            });
            const data = await res.json();
            node.classList.remove('active');
            if(data.status === 'success') {
                showPanel(agent.name + " 분석 결과", data.output, true);
                lastOutput = data.output;
                nodeOutputs[agent.id] = data.output; node.classList.add('completed');
                const conn = connections.find(c => c.from === agent.id); nextId = conn ? conn.to : null;
            } else {
                addLog("System", "❌ 에러: " + data.message);
                alert(data.message);
            }
        }

        function handleApprove() {
            closePanel();
            if(nextId) {
                addLog("System", "✅ 승인됨. 다음 에이전트("+nextId+") 업무 시작.");
                selectedAgent = agents.find(a => a.id === nextId);
                assignTaskWithPrompt(nextId, lastOutput);
            }
        }
        function handleReject() { closePanel(); nextId = null; addLog("System", "❌ 반려됨. 수동 재지시 필요."); }

        async function assignTaskWithPrompt(id, p) {
            const node = document.getElementById('node-' + id);
            node.classList.add('active');
            addLog(id, "이전 결과를 바탕으로 심층 분석 중...");
            const res = await fetch('/api/workflow/run', {
                method: 'POST', body: JSON.stringify({ agentId: id, prompt: p, context: Array.from(selectedFiles) })
            });
            const data = await res.json();
            node.classList.remove('active');
            showPanel(id + " 분석 결과", data.output, true);
            lastOutput = data.output;
            const conn = connections.find(c => c.from === id); nextId = conn ? conn.to : null;
        }

        function initNodes() {
            const container = document.getElementById('nodes-container'); container.innerHTML = '';
            agents.forEach(a => {
                const el = document.createElement('div'); el.className = 'node'; el.id = 'node-' + a.id;
                el.style.left = a.x + 'px'; el.style.top = a.y + 'px';
                el.innerHTML = '<div class="node-name">' + a.name + '</div><div class="node-role">' + a.role + '</div>' +
                             '<div class="port port-in" onmouseup="endConnection(event, \''+a.id+'\')"></div>' +
                             '<div class="port port-out" onmousedown="startConnection(event, \''+a.id+'\')"></div>';
                el.onmousedown = (e) => { if(!e.target.classList.contains('port')) startDragging(e, el); };
                el.onclick = (e) => { if(!e.target.classList.contains('port')) openDrawer(a); };
                container.appendChild(el);
            });
        }

        function startDragging(e, el) {
            const cR = document.getElementById('canvas-area').getBoundingClientRect();
            let shiftX = e.clientX - el.getBoundingClientRect().left;
            let shiftY = e.clientY - el.getBoundingClientRect().top;
            document.onmousemove = (ev) => {
                el.style.left = (ev.clientX - cR.left - shiftX) + 'px';
                el.style.top = (ev.clientY - cR.top - shiftY) + 'px';
                drawConnections();
            };
            document.onmouseup = () => { document.onmousemove = null; saveState(); };
        }

        function startConnection(e, fromId) {
            e.stopPropagation(); isConnecting = true; tempLineFrom = fromId;
            document.onmousemove = drawTempLine;
            document.onmouseup = () => { isConnecting = false; document.onmousemove = null; document.getElementById('flow-svg').querySelector('.temp-line')?.remove(); };
        }

        function endConnection(e, toId) {
            if(isConnecting && tempLineFrom !== toId) { connections.push({ from: tempLineFrom, to: toId }); drawConnections(); saveState(); }
        }

        function drawConnections() {
            const svg = document.getElementById('flow-svg'); const defs = svg.querySelector('defs').outerHTML; svg.innerHTML = defs;
            const cR = document.getElementById('canvas-area').getBoundingClientRect();
            connections.forEach((conn, index) => {
                const f = document.getElementById('node-' + conn.from); const t = document.getElementById('node-' + conn.to);
                if(f && t) {
                    const fR = f.getBoundingClientRect(); const tR = t.getBoundingClientRect();
                    const x1 = fR.right - cR.left; const y1 = fR.top + fR.height/2 - cR.top;
                    const x2 = tR.left - cR.left; const y2 = tR.top + tR.height/2 - cR.top;
                    const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    p.setAttribute("d", `M ${x1} ${y1} C ${x1+40} ${y1}, ${x2-40} ${y2}, ${x2} ${y2}`);
                    p.setAttribute("class", "flow-line"); p.setAttribute("marker-end", "url(#arrow)");
                    p.onclick = () => { connections.splice(index, 1); drawConnections(); saveState(); };
                    svg.appendChild(p);
                }
            });
        }

        function drawTempLine(e) {
            const svg = document.getElementById('flow-svg'); svg.querySelector('.temp-line')?.remove();
            const from = document.getElementById('node-' + tempLineFrom).getBoundingClientRect();
            const cR = document.getElementById('canvas-area').getBoundingClientRect();
            const x1 = from.right - cR.left; const y1 = from.top + from.height/2 - cR.top;
            const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
            line.setAttribute("d", `M ${x1} ${y1} L ${e.clientX - cR.left} ${e.clientY - cR.top}`);
            line.setAttribute("class", "temp-line"); svg.appendChild(line);
        }

        function clearConnections() { connections = []; drawConnections(); saveState(); }
        async function updateHealth() {
            const res = await fetch('/api/providers/health'); const data = await res.json();
            Object.keys(data).forEach(id => { const d = document.getElementById('dot-' + id); if(d) d.className = 'dot ' + (data[id] ? 'online' : 'offline'); });
        }
        function openDrawer(a) { selectedAgent = a; document.getElementById('drawer-title').innerText = a.name; document.getElementById('sidebar-right').style.display = 'flex'; }
        function closeDrawer() { document.getElementById('sidebar-right').style.display = 'none'; }
        function showPanel(t, c, isApp) { document.getElementById('panel-title').innerText = t; document.getElementById('panel-content').innerText = c; document.getElementById('overlay-panel').style.display = 'flex'; }
        function closePanel() { document.getElementById('overlay-panel').style.display = 'none'; }
        function openKeyModal(p) { window.targetProvider = p; document.getElementById('key-modal').style.display='flex'; }
        async function saveApiKey() {
            const key = document.getElementById('api-key-input').value;
            await fetch('/api/providers/keys', { method: 'POST', body: JSON.stringify({ provider: window.targetProvider, key }) });
            document.getElementById('key-modal').style.display='none'; updateHealth();
        }

        async function saveState() {
            const state = { nodes: agents.map(a => { const el = document.getElementById('node-'+a.id); return {id:a.id, x:el.style.left, y:el.style.top, status:el.classList.contains('completed')?'completed':el.classList.contains('active')?'active':'pending', output:nodeOutputs[a.id]||''}; }), connections };
            await fetch('/api/workflow/state', { method: 'POST', body: JSON.stringify(state) });
        }
        async function loadState() {
            const res = await fetch('/api/workflow/state'); const data = await res.json();
            if(data.nodes) { data.nodes.forEach(n => { const el = document.getElementById('node-'+n.id); if(el){ el.style.left = typeof n.x==='number'?n.x+'px':n.x; el.style.top = typeof n.y==='number'?n.y+'px':n.y; if(n.status==='completed') el.classList.add('completed'); if(n.output) nodeOutputs[n.id]=n.output; } }); connections = data.connections || []; drawConnections(); }
        }

        function init() { initNodes(); changeWorkspace('.'); updateHealth(); setInterval(updateHealth, 5000); setTimeout(loadState, 500); }
        init();
    </script>
</body>
</html>
