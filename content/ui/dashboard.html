<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Autopus Virtual Studio</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-bg: #161b22;
            --border-color: #30363d;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #d29922;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
        }
        body { background: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Layout */
        .sidebar-left { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 50; }
        .main-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        .sidebar-right { width: 450px; background: var(--sidebar-bg); border-left: 1px solid var(--border-color); padding: 20px; display: none; flex-direction: column; z-index: 50; }
        
        .top-bar { height: 55px; background: var(--sidebar-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .provider-status { display: flex; gap: 15px; }
        .status-item { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #484f58; transition: background 0.3s; }
        .dot.online { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .dot.offline { background: var(--accent-red); }

        .file-list { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; }
        .file-item { padding: 6px 8px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .file-item:hover { background: #1f242c; }
        .file-checkbox { width: 14px; height: 14px; cursor: pointer; margin: 0; }

        .canvas { flex: 1; position: relative; background-image: radial-gradient(#30363d 1px, transparent 1px); background-size: 40px 40px; }
        .lane-container { display: flex; width: 100%; height: 100%; position: absolute; pointer-events: none; }
        .lane { flex: 1; border-right: 1px dashed #30363d; display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
        .lane-title { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 20px; background: #1f242c; padding: 3px 10px; border-radius: 10px; }

        .node { background: #21262d; border: 1px solid var(--border-color); border-radius: 8px; width: 170px; padding: 12px; margin-bottom: 15px; pointer-events: auto; cursor: pointer; transition: transform 0.2s, border-color 0.2s; position: relative; }
        .node:hover { border-color: var(--accent-blue); transform: translateY(-2px); }
        .node.active { border-color: var(--accent-orange); animation: pulse 1.5s infinite; }
        .node.completed { border-color: var(--accent-green); }
        
        .node-name { font-size: 13px; font-weight: bold; margin-bottom: 4px; }
        .node-role { font-size: 11px; color: var(--text-dim); }

        .overlay-panel { position: absolute; top: 20px; left: 20px; right: 20px; bottom: 20px; background: #0d1117; border: 1px solid var(--border-color); border-radius: 12px; z-index: 100; display: none; flex-direction: column; }
        .panel-body { flex: 1; padding: 25px; overflow: auto; white-space: pre-wrap; font-size: 14px; line-height: 1.6; }

        textarea { flex: 1; background: #010409; border: 1px solid var(--border-color); border-radius: 8px; color: white; padding: 20px; margin: 15px 0; resize: none; font-size: 15px; line-height: 1.6; }
        .btn-run { background: var(--accent-blue); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .terminal { height: 150px; background: #010409; border-top: 1px solid var(--border-color); padding: 15px; overflow-y: auto; font-family: monospace; font-size: 12px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="sidebar-left">
        <div style="padding:15px; border-bottom:1px solid var(--border-color); font-weight:bold; display:flex; justify-content:space-between;">
            📁 파일 탐색기 <span id="sel-count" style="color:var(--accent-blue); font-size:10px;">0개</span>
        </div>
        <div class="file-list" id="file-list"></div>
    </div>

    <div class="main-area">
        <div class="top-bar">
            <div style="font-weight:900; color:var(--accent-blue)">🐙 AUTOPUS Virtual Studio</div>
            <div class="provider-status">
                <div class="status-item" onclick="openKeyModal('claude')"><div id="dot-claude" class="dot"></div> Claude</div>
                <div class="status-item" onclick="openKeyModal('gemini')"><div id="dot-gemini" class="dot"></div> Gemini</div>
                <div class="status-item" onclick="openKeyModal('codex')"><div id="dot-codex" class="dot online"></div> Codex</div>
            </div>
            <div id="proj-name" style="font-size:12px; color:var(--accent-green)">로딩 중...</div>
        </div>
        
        <div class="canvas">
            <div class="lane-container">
                <div class="lane" id="lane-plan"><div class="lane-title">기획 & 설계</div></div>
                <div class="lane" id="lane-dev"><div class="lane-title">개발 & 구현</div></div>
                <div class="lane" id="lane-qa"><div class="lane-title">검증 & QA</div></div>
                <div class="lane" id="lane-ops"><div class="lane-title">리뷰 & 배포</div></div>
            </div>

            <div class="overlay-panel" id="overlay-panel">
                <div style="padding:10px 20px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between; background:#161b22;">
                    <span id="panel-title">내용</span>
                    <button class="btn-run" style="padding:4px 12px; background:transparent; border:1px solid var(--border-color)" onclick="closePanel()">닫기</button>
                </div>
                <div class="panel-body" id="panel-content"></div>
            </div>
        </div>

        <div class="terminal" id="terminal"><div>[System] 연쇄 워크플로우 엔진이 활성화되었습니다.</div></div>
    </div>

    <div class="sidebar-right" id="sidebar-right">
        <h3 id="drawer-title" style="color:var(--accent-blue); margin:0;">업무 할당</h3>
        <p id="drawer-desc" style="font-size:11px; color:var(--text-dim); margin:5px 0 20px 0;"></p>
        <textarea id="prompt-input" placeholder="에이전트에게 내릴 지시사항을 입력하세요..."></textarea>
        <button class="btn-run" id="btn-workflow" onclick="startWorkflow()">⛓️ 연쇄 워크플로우 시작 (Chained)</button>
        <button class="btn-run" style="background:transparent; color:var(--text-dim); width:100%; margin-top:10px;" onclick="closeDrawer()">취소</button>
    </div>

    <div class="modal-overlay" id="key-modal">
        <div class="modal">
            <h3 id="key-modal-title">API 키 등록</h3>
            <input type="password" id="api-key-input" placeholder="키를 입력하세요...">
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <button class="btn-run" style="background:transparent; color:var(--text-dim);" onclick="closeKeyModal()">취소</button>
                <button class="btn-run" onclick="saveApiKey()">적용</button>
            </div>
        </div>
    </div>

    <script>
        let selectedAgent = null;
        let selectedFiles = new Set();
        let targetProvider = '';

        const agents = [
            { id: "planner", name: "Planner", role: "기획자", dept: "plan", desc: "분석 및 태스크 분해" },
            { id: "spec", name: "Spec Writer", role: "명세 작성자", dept: "plan", desc: "SPEC.md 작성" },
            { id: "arch", name: "Architect", role: "아키텍트", dept: "plan", desc: "구조 설계" },
            { id: "expl", name: "Explorer", role: "탐험가", dept: "plan", desc: "코드 분석" },
            { id: "exec", name: "Executor", role: "실행자", dept: "dev", desc: "코드 구현" },
            { id: "deep", name: "Deep Worker", role: "심층 작업자", dept: "dev", desc: "장기 태스크" },
            { id: "dbug", name: "Debugger", role: "해결사", dept: "dev", desc: "버그 수정" },
            { id: "anno", name: "Annotator", role: "태그 관리자", dept: "dev", desc: "@AX 주석 관리" },
            { id: "test", name: "Tester", role: "테스터", dept: "qa", desc: "테스트 작성" },
            { id: "val", name: "Validator", role: "검증자", dept: "qa", desc: "품질 검증" },
            { id: "fend", name: "Frontend Spec", role: "UI 전문가", dept: "qa", desc: "E2E 테스트" },
            { id: "uxv", name: "UX Validator", role: "UX 검증자", dept: "qa", desc: "비주얼 회귀" },
            { id: "perf", name: "Perf Engineer", role: "성능 전문가", dept: "qa", desc: "병목 분석" },
            { id: "rev", name: "Reviewer", role: "리뷰어", dept: "ops", desc: "코드 리뷰" },
            { id: "sec", name: "Security Audit", role: "보안 감사", dept: "ops", desc: "보안 점검" },
            { id: "devops", name: "DevOps", role: "운영자", dept: "ops", desc: "배포 자동화" }
        ];

        async function loadFiles() {
            const res = await fetch('/api/files/list');
            const files = await res.json();
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            files.forEach(f => {
                const item = document.createElement('div');
                item.className = 'file-item';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.className = 'file-checkbox';
                cb.onchange = () => { if(cb.checked) selectedFiles.add(f); else selectedFiles.delete(f); document.getElementById('sel-count').innerText = selectedFiles.size; };
                const span = document.createElement('span');
                span.innerHTML = '📄 ' + f;
                span.onclick = async () => {
                    const r = await fetch('/api/files/read?path=' + encodeURIComponent(f));
                    showPanel(f, await r.text());
                };
                item.appendChild(cb);
                item.appendChild(span);
                list.appendChild(item);
            });
        }

        async function startWorkflow() {
            let currentId = selectedAgent.id;
            let prompt = document.getElementById('prompt-input').value;
            closeDrawer();
            addLog("System", "연쇄 워크플로우를 시작합니다.");

            while(currentId) {
                const node = document.getElementById('node-' + currentId);
                node.classList.add('active');
                addLog(currentId.toUpperCase(), "작업을 시작합니다...");

                const res = await fetch('/api/workflow/run', {
                    method: 'POST',
                    body: JSON.stringify({ agentId: currentId, prompt, context: Array.from(selectedFiles) })
                });
                const data = await res.json();

                node.classList.remove('active');
                node.classList.add('completed');
                addLog(currentId.toUpperCase(), "작업 완료. 다음 단계로 넘깁니다.");

                // 다음 단계 설정
                currentId = data.nextAgent;
                prompt = data.output; // AI의 답변이 다음 에이전트의 입력이 됨!
                if(!currentId) {
                    addLog("System", "모든 워크플로우가 성공적으로 끝났습니다.");
                    break;
                }
                await new Promise(r => setTimeout(r, 1000)); // 시각적 효과를 위한 대기
            }
        }

        function addLog(agent, msg) {
            const term = document.getElementById('terminal');
            const div = document.createElement('div');
            div.innerHTML = '<span style="color:var(--accent-orange)">[' + agent + ']</span> ' + msg;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        function openKeyModal(p) { targetProvider = p; document.getElementById('key-modal-title').innerText = p.toUpperCase() + ' API 키 등록'; document.getElementById('key-modal').style.display = 'flex'; }
        function closeKeyModal() { document.getElementById('key-modal').style.display = 'none'; }
        async function saveApiKey() {
            const key = document.getElementById('api-key-input').value;
            await fetch('/api/providers/keys', { method: 'POST', body: JSON.stringify({ provider: targetProvider, key }) });
            closeKeyModal();
            updateHealth();
        }

        async function updateHealth() {
            const res = await fetch('/api/providers/health');
            const data = await res.json();
            Object.keys(data).forEach(id => {
                const d = document.getElementById('dot-' + id);
                if(d) d.className = 'dot ' + (data[id] ? 'online' : 'offline');
            });
        }

        function showPanel(t, c) { document.getElementById('panel-title').innerText = t; document.getElementById('panel-content').innerText = c; document.getElementById('overlay-panel').style.display = 'flex'; }
        function closePanel() { document.getElementById('overlay-panel').style.display = 'none'; }
        function openDrawer(a) { selectedAgent = a; document.getElementById('drawer-title').innerText = a.name; document.getElementById('drawer-desc').innerText = a.desc; document.getElementById('sidebar-right').style.display = 'flex'; }
        function closeDrawer() { document.getElementById('sidebar-right').style.display = 'none'; }

        function init() {
            agents.forEach(a => {
                const lane = document.getElementById('lane-' + a.dept);
                const node = document.createElement('div');
                node.className = 'node';
                node.id = 'node-' + a.id;
                node.onclick = () => openDrawer(a);
                node.innerHTML = '<div class="node-name">' + a.name + '</div><div class="node-role">' + a.role + '</div>';
                lane.appendChild(node);
            });
            loadFiles();
            updateHealth();
            setInterval(updateHealth, 5000);
            fetch('/api/status').then(r => r.json()).then(d => document.getElementById('proj-name').innerText = "PROJECT: " + d.project.toUpperCase());
        }
        init();
    </script>
</body>
</html>
`
