<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Autopus Virtual Studio</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-bg: #161b22;
            --border-color: #30363d;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
        }
        body { background: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Layout */
        .sidebar-left { width: 250px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 50; }
        .main-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        .sidebar-right { width: 400px; background: var(--sidebar-bg); border-left: 1px solid var(--border-color); padding: 20px; display: none; flex-direction: column; z-index: 50; }
        
        .top-bar { height: 50px; background: var(--sidebar-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        
        .file-list { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; }
        .file-item { padding: 6px 8px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .file-item:hover { background: #1f242c; }
        .file-item.selected { background: rgba(88, 166, 255, 0.1); }
        .file-checkbox { width: 14px; height: 14px; cursor: pointer; }

        .canvas { flex: 1; position: relative; background-image: radial-gradient(#30363d 1px, transparent 1px); background-size: 30px 30px; overflow: hidden; }
        .lane-container { display: flex; width: 100%; height: 100%; position: absolute; pointer-events: none; }
        .lane { flex: 1; border-right: 1px dashed #30363d; display: flex; flex-direction: column; align-items: center; padding-top: 30px; }
        .lane-title { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 15px; }

        .node { background: #21262d; border: 1px solid var(--border-color); border-radius: 6px; width: 160px; padding: 10px; margin-bottom: 12px; pointer-events: auto; cursor: pointer; transition: 0.2s; }
        .node:hover { border-color: var(--accent-blue); transform: translateY(-2px); }
        .node.active { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(88, 166, 255, 0.4); animation: pulse 1.5s infinite; }
        .node-name { font-size: 13px; font-weight: bold; margin-bottom: 4px; }
        .node-role { font-size: 10px; color: var(--text-dim); }

        /* Code Viewer Overlay */
        .code-viewer { position: absolute; top: 20px; left: 20px; right: 20px; bottom: 20px; background: #010409; border: 1px solid var(--border-color); border-radius: 8px; z-index: 100; display: none; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .code-header { padding: 10px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: #161b22; }
        .code-body { flex: 1; padding: 20px; overflow: auto; font-family: 'Consolas', monospace; font-size: 13px; white-space: pre; line-height: 1.5; color: #d1d5db; }

        .terminal { height: 180px; background: #010409; border-top: 1px solid var(--border-color); padding: 15px; overflow-y: auto; font-family: monospace; font-size: 11px; }

        /* Work Panel */
        .drawer-title { font-size: 18px; font-weight: bold; color: var(--accent-blue); margin-bottom: 5px; }
        textarea { flex: 1; background: #0d1117; border: 1px solid var(--border-color); border-radius: 6px; color: white; padding: 15px; margin: 15px 0; resize: none; line-height: 1.6; font-size: 14px; }
        .btn-run { background: var(--accent-blue); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 700; cursor: pointer; }
        .context-chip { font-size: 10px; background: #1f242c; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border-color); margin-right: 5px; margin-bottom: 5px; display: inline-block; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="sidebar-left">
        <div style="padding:15px; border-bottom:1px solid var(--border-color); font-weight:bold; font-size:13px; display:flex; justify-content:space-between;">
            파일 탐색기
            <span id="selected-count" style="font-size:10px; color:var(--accent-blue)">0개 선택됨</span>
        </div>
        <div class="file-list" id="file-list"></div>
    </div>

    <div class="main-area">
        <div class="top-bar">
            <div style="font-weight:900; color:var(--accent-blue); font-size:16px;">🐙 AUTOPUS STUDIO</div>
            <div id="proj-name" style="font-size:12px; color:var(--accent-green)">PROJECT: LOADING...</div>
        </div>
        
        <div class="canvas">
            <div class="lane-container">
                <div class="lane" id="lane-plan"><div class="lane-title">PLAN</div></div>
                <div class="lane" id="lane-dev"><div class="lane-title">DEV</div></div>
                <div class="lane" id="lane-qa"><div class="lane-title">QA</div></div>
                <div class="lane" id="lane-ops"><div class="lane-title">OPS</div></div>
            </div>

            <!-- Code Viewer -->
            <div class="code-viewer" id="code-viewer">
                <div class="code-header">
                    <span id="code-filename">filename.py</span>
                    <button class="btn-run" style="padding:4px 12px; background:transparent; border:1px solid var(--border-color);" onclick="closeCode()">닫기</button>
                </div>
                <div class="code-body" id="code-content"></div>
            </div>
        </div>

        <div class="terminal" id="terminal"></div>
    </div>

    <div class="sidebar-right" id="sidebar-right">
        <div class="drawer-title" id="drawer-title">업무 할당</div>
        <div style="font-size:11px; color:var(--text-dim); margin-bottom:15px;" id="drawer-desc"></div>
        
        <div style="font-size:11px; font-weight:bold; margin-bottom:5px;">선택된 컨텍스트 파일:</div>
        <div id="selected-files-container" style="max-height:80px; overflow-y:auto; margin-bottom:10px;"></div>

        <textarea id="prompt-input" placeholder="에이전트에게 내릴 구체적인 명령을 입력하세요..."></textarea>
        <button class="btn-run" onclick="assignTask()">명령 실행 (ENTER)</button>
        <button class="btn-run" style="background:transparent; color:var(--text-dim); margin-top:10px;" onclick="closeDrawer()">취소</button>
    </div>

    <script>
        let selectedAgent = null;
        let selectedContextFiles = new Set();

        const agents = [
            { id: "planner", name: "Planner", role: "기획자", dept: "plan", desc: "아이디어 분석 및 태스크 분해" },
            { id: "spec", name: "Spec Writer", role: "명세 작성자", dept: "plan", desc: "EARS 명세서 작성" },
            { id: "arch", name: "Architect", role: "아키텍트", dept: "plan", desc: "시스템 구조 설계" },
            { id: "expl", name: "Explorer", role: "탐험가", dept: "plan", desc: "코드베이스 구조 매핑" },
            { id: "exec", name: "Executor", role: "실행자", dept: "dev", desc: "TDD 기반 기능 구현" },
            { id: "deep", name: "Deep Worker", role: "심층 작업자", dept: "dev", desc: "복잡한 장기 태스크 전담" },
            { id: "dbug", name: "Debugger", role: "해결사", dept: "dev", desc: "버그 수정 및 예외 처리" },
            { id: "anno", name: "Annotator", role: "태그 관리자", dept: "dev", desc: "@AX 태그 관리" },
            { id: "test", name: "Tester", role: "테스터", dept: "qa", desc: "테스트 코드 작성" },
            { id: "val", name: "Validator", role: "검증자", dept: "qa", desc: "품질 게이트 체크" },
            { id: "fend", name: "Frontend Spec", role: "UI 전문가", dept: "qa", desc: "E2E 테스트" },
            { id: "uxv", name: "UX Validator", role: "UX 검증자", dept: "qa", desc: "비주얼 회귀 검사" },
            { id: "perf", name: "Perf Engineer", role: "성능 전문가", dept: "qa", desc: "병목 분석" },
            { id: "rev", name: "Reviewer", role: "리뷰어", dept: "ops", desc: "코드 리뷰 및 반려" },
            { id: "sec", name: "Security Audit", role: "보안 감사", dept: "ops", desc: "보안 취약점 스캔" },
            { id: "devops", name: "DevOps", role: "운영자", dept: "ops", desc: "CI/CD 자동화" }
        ];

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            if (ext === 'py') return '🐍';
            if (ext === 'md') return '📝';
            if (ext === 'go') return '🐹';
            if (ext === 'json') return '📦';
            if (ext === 'yaml' || ext === 'yml') return '⚙️';
            if (ext === 'sh' || ext === 'bat') return '🐚';
            if (ext === 'txt') return '📄';
            return '📄';
        }

        async function loadFiles() {
            const res = await fetch('/api/files/list');
            const files = await res.json();
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            files.forEach(f => {
                const item = document.createElement('div');
                item.className = 'file-item';
                
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.className = 'file-checkbox';
                cb.onclick = (e) => {
                    e.stopPropagation();
                    if (cb.checked) selectedContextFiles.add(f);
                    else selectedContextFiles.delete(f);
                    updateSelectedCount();
                };

                const span = document.createElement('span');
                span.innerText = getFileIcon(f) + ' ' + f;
                span.onclick = () => openFile(f);

                item.appendChild(cb);
                item.appendChild(span);
                list.appendChild(item);
            });
        }

        function updateSelectedCount() {
            document.getElementById('selected-count').innerText = selectedContextFiles.size + '개 선택됨';
            const container = document.getElementById('selected-files-container');
            container.innerHTML = '';
            selectedContextFiles.forEach(f => {
                const chip = document.createElement('div');
                chip.className = 'context-chip';
                chip.innerText = f;
                container.appendChild(chip);
            });
        }

        async function openFile(path) {
            const res = await fetch('/api/files/read?path=' + encodeURIComponent(path));
            const content = await res.text();
            document.getElementById('code-filename').innerText = path;
            document.getElementById('code-content').innerText = content;
            document.getElementById('code-viewer').style.display = 'flex';
        }

        function closeCode() { document.getElementById('code-viewer').style.display = 'none'; }

        function openDrawer(agent) {
            selectedAgent = agent;
            document.getElementById('drawer-title').innerText = agent.name + ' 업무 할당';
            document.getElementById('drawer-desc').innerText = agent.desc;
            document.getElementById('sidebar-right').style.display = 'flex';
            updateSelectedCount();
        }

        function closeDrawer() { document.getElementById('sidebar-right').style.display = 'none'; }

        function addLog(msg) {
            const term = document.getElementById('terminal');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = '<span style="color:var(--text-dim)">[' + new Date().toLocaleTimeString() + ']</span> ' + msg;
            term.appendChild(entry);
            term.scrollTop = term.scrollHeight;
        }

        async function assignTask() {
            const prompt = document.getElementById('prompt-input').value;
            if (!prompt) return;
            const agent = selectedAgent;
            addLog('<b>' + agent.name + '</b>에게 업무를 전달했습니다. (참조파일: ' + selectedContextFiles.size + '개)');
            const node = document.getElementById('node-' + agent.id);
            node.classList.add('active');
            
            await fetch('/api/agent/assign', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    agentId: agent.id, 
                    prompt: prompt,
                    context: Array.from(selectedContextFiles)
                })
            });

            setTimeout(() => {
                addLog('<b>' + agent.name + '</b>: 작업이 성공적으로 완료되었습니다.');
                node.classList.remove('active');
            }, 2000);
        }

        function init() {
            agents.forEach(a => {
                const lane = document.getElementById('lane-' + a.dept);
                const node = document.createElement('div');
                node.className = 'node';
                node.id = 'node-' + a.id;
                node.onclick = () => openDrawer(a);
                node.innerHTML = '<div class="node-name">' + a.name + '</div><div class="node-role">' + a.role + '</div>';
                lane.appendChild(node);
            });
            loadFiles();
            addLog('Autopus Virtual Studio가 준비되었습니다.');
        }

        init();
        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('proj-name').innerText = "PROJECT: " + data.project.toUpperCase();
            } catch(e) {}
        }
        updateStatus();
    </script>
</body>
</html>
